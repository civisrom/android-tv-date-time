[tool.poetry]
name = "androidtvtimefixer"
version = "1.0.0"
description = "Time fixer for Android TV"
authors = ["Orientalium"]
readme = "README.md"
packages = [{include = "android_time_fixer.py"}]

[tool.poetry.dependencies]
python = ">=3.11,<3.12"
adb-shell = {extras = ["usb", "network"], version = "^0.4.4"}
pyperclip = "^1.8.2"
colorama = "^0.4.6"
platformdirs = "^3.5.0"
packaging = "^23.0"
typing-extensions = "^4.5.0"
cryptography = "^41.0.0"
pyusb = "^1.2.1"
libusb1 = "^3.0.0"
rsa = "^4.9.0"

# Зависимости для Windows
[tool.poetry.group.windows.dependencies]
pywin32 = {version = "^306", platform = "win32"}

# Зависимости для Linux
[tool.poetry.group.linux.dependencies]
some-linux-library = "^2.0"  # Пример, замените на реальные библиотеки, если необходимо

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 100
target-version = ['py310', 'py311']

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 100
