[tool.poetry]
name = "androidtvtimefixer"
version = "1.0.0"
description = "Time fixer for Android TV"
authors = ["Your Name <your.email@example.com>"]
readme = "README.md"
packages = [{include = "android_time_fixer.py"}]

[tool.poetry.dependencies]
python = ">=3.13,<3.14"
pywin32 = { version = ">=306", markers = "sys_platform == 'win32'" }
adb-shell = {extras = ["usb"], version = "^0.4.3"}
pyperclip = "^1.8.2"
colorama = "^0.4.6"
platformdirs = "^3.5.0"
packaging = "^23.0"
typing-extensions = "^4.5.0"
cryptography = "^41.0.0"
pyusb = "^1.2.1"  # Возможно, libusb1 не нужен, если используете pyusb
libusb1 = "^3.0.0"
rsa = "^4.9.0"

[tool.poetry.group.dev.dependencies]
pyinstaller = "^6.11.1"
pytest = "^7.4.0"
black = "^23.3.0"
isort = "^5.12.0"
flake8 = "^6.0.0"

[tool.poetry.group.windows.dependencies]
pywin32 = {version = "^306", platform = "win32"}
wmi = {version = "^1.5.1", platform = "win32"}
windows-curses = {version = "^2.3.1", platform = "win32"}

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 100
target-version = ['py310', 'py311']  # Обновите целевые версии Python

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
