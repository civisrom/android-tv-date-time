[tool.poetry]
name = "androidtvtimefixer"
version = "1.1.0"
description = "Time fixer for Android TV"
authors = ["Your Name <your.email@example.com>"]
readme = "README.md"
packages = [{include = "android_time_fixer.py"}]

[tool.poetry.dependencies]
python = ">=3.11,<3.12"
adb-shell = {extras = ["usb", "network"], version = "^0.4.4"}
pyperclip = "^1.8.2"
colorama = "^0.4.6"
platformdirs = "^3.5.0"
packaging = "^23.0"
typing-extensions = "^4.5.0"
cryptography = "^41.0.0"
pyusb = "^1.2.1"
libusb1 = "^3.0.0"
rsa = "^4.9.0"
aiofiles = "^23.2.1"
async-timeout = "^4.0.3"

[tool.poetry.group.windows.dependencies]
pywin32 = {version = "^306", platform = "win32"}
psutil = "^5.9.0"
wmi = "^1.5.1"
pywinusb = "^0.4.2"

[tool.poetry.group.linux.dependencies]
dbus-python = {version = "^1.3.2", optional = true}
python-udev = {version = "^0.24.0", optional = true}

[tool.poetry.group.build.dependencies]
pyinstaller = "^6.11.0"
setuptools = "^69.0.0"
wheel = "^0.42.0"
patchelf = {version = "^0.17.2.1", platform = "linux"}
pyinstaller-hooks-contrib = "^2024.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.3.0"
black = "^23.0.0"
flake8 = "^6.0.0"
mypy = "^1.0.0"
coverage = "^7.4.0"

[tool.poetry.extras]
linux = ["dbus-python", "python-udev"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 100
target-version = ['py310', 'py311']

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 100
