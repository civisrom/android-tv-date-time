name: Update Dependencies

on:
  schedule:
    - cron: "0 0 1 * *"  # Обновление раз в месяц
  workflow_dispatch:  # Ручной запуск

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Явное разрешение на запись в репозиторий

    steps:
      # Клонируем репозиторий с полной историей
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Загружаем полную историю
          token: ${{ secrets.GITHUB_TOKEN }}  # Используем токен для пуша

      # Устанавливаем Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Кэширование зависимостей Poetry
      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pypoetry
            ~/.local/share/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      # Устанавливаем Poetry
      - name: Install and Configure Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          source "$HOME/.local/bin/poetry" env use python3.11
        shell: bash

      # Подробное обновление зависимостей с логированием
      - name: Update Dependencies
        run: |
          poetry self update
          poetry lock --no-update
          poetry update
          echo "Dependency update completed"

      # Расширенная проверка изменений
      - name: Check Dependency Changes
        id: dep_changes
        run: |
          git diff --quiet poetry.lock || {
            echo "Dependencies have changed"
            echo "status=changed" >> $GITHUB_OUTPUT
            git diff poetry.lock
          }

      # Коммит и пуш изменений с расширенной информативностью
      - name: Commit and Push Changes
        if: steps.dep_changes.outputs.status == 'changed'
        run: |
          git config user.name "GitHub Dependencies Bot"
          git config user.email "<>"
          
          # Генерируем подробный лог изменений
          changes=$(git diff --stat poetry.lock)
          
          git add poetry.lock
          git commit -m "🔄 Update project dependencies

          Automated dependency updates:
          ${changes}"
          
          git push origin main

      # Уведомление о статусе обновления
      - name: Dependency Update Status
        if: steps.dep_changes.outputs.status == 'changed'
        run: echo "✅ Dependencies successfully updated and pushed"
