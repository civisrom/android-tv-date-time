name: Update dependencies

on:
  schedule:
    - cron: "0 0 1 * *"  # Обновление зависимостей раз в месяц
  workflow_dispatch:  # Возможность запуска вручную

env:
  PYTHON_VERSION: '3.12'
  CI_DEBUG: true
  POETRY_VERSION: '1.8.4'
  PYINSTALLER_VERSION: '6.11.1'

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Create Poetry config directory
        run: |
          mkdir -p ~/.config/pypoetry
          echo '{
            "virtualenvs": {
              "create": true,
              "in-project": true
            }
          }' > ~/.config/pypoetry/config.toml
        shell: bash

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==${{ env.POETRY_VERSION }}"
        shell: bash

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Show Poetry version
        run: poetry --version
        shell: bash

      - name: Update dependencies
        run: |
          # Обновляем зависимости
          poetry install --no-interaction --with dev --all-extras
          poetry update
          poetry run pip install "pyinstaller==${{ env.PYINSTALLER_VERSION }}"
        shell: bash

      - name: Configure Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
        shell: bash

      - name: Commit and push changes
        run: |
          if [[ -n "$(git status --porcelain poetry.lock)" ]]; then
            git add poetry.lock
            git commit -m "chore: update dependencies [skip ci]"
            git push origin ${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi
        shell: bash
