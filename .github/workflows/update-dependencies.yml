name: Update dependencies
on:
  schedule:
    - cron: "0 0 1 * *"  # Пример расписания для обновления зависимостей раз в месяц
  workflow_dispatch:  # Также можно запускать вручную

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Устанавливаем Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Шаг 3: Устанавливаем Poetry
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH  # Добавляем Poetry в путь

      # Принудительное обновление зависимостей
      - name: Update dependencies
        run: |
          poetry self update
          poetry lock
          poetry install
          poetry update

      # Шаг 6: Настраиваем пользователя Git
      - name: Configure Git user
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      # Шаг 7: Коммитим и пушим изменения в основную ветку
      - name: Commit and push changes to main
        run: |
          git add poetry.lock
          git commit -m "Update dependencies" || echo "No changes to commit"
          git push origin main || echo "No changes to push"
