name: Update Dependencies

on:
  schedule:
    - cron: "0 0 1 * *"  # Обновление зависимостей раз в месяц
  workflow_dispatch:  # Возможность запуска вручную

env:
  PYTHON_VERSION: '3.11'
  CI_DEBUG: true
  POETRY_VERSION: '1.8.4'
  PYINSTALLER_VERSION: '6.11.1'

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
        
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry==${{ env.POETRY_VERSION }}
        shell: bash
        
      # Шаг: Очищаем кэш Poetry
      - name: Clear Poetry cache
        run: |
          rm -rf ~/.cache/pypoetry
          
      # Настройка Poetry
      - name: Configure Poetry
        run: |
          python -m poetry config virtualenvs.create false
          # Отключаем экспериментальные функции, которые могут вызывать проблемы
          python -m poetry config experimental.new-installer false
        shell: bash
        
      # Шаг 3: Кэшируем зависимости Poetry
      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-
            
      # Обновляем зависимости без использования виртуальной среды
      - name: Update dependencies
        run: |
          python -m poetry lock --no-update
          python -m poetry update
        shell: bash

      # Шаг: Настраиваем пользователя Git
      - name: Configure Git user
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      # Шаг: Проверяем изменения и пушим их
      - name: Commit and push changes to main
        run: |
          git add poetry.lock
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update dependencies"
            git push origin main
          fi
