name: Update Dependencies

on:
  schedule:
    - cron: "0 2 * * 1" # Запуск каждую неделю в понедельник в 02:00 UTC
  workflow_dispatch: # Возможность ручного запуска

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Install dependencies
        run: |
          poetry install

      - name: Update dependencies
        run: |
          poetry update

      - name: Commit changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b update-dependencies
          git pull origin main  # Сначала подтягиваем изменения с main, чтобы избежать конфликтов
          git add poetry.lock
          git commit -m "Update dependencies"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} update-dependencies
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          branch: update-dependencies
          title: "Update dependencies"
          body: "This PR updates dependencies to their latest versions."
