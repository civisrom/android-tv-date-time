name: Update dependencies

on:
  schedule:
    - cron: "0 0 1 * *"  # Обновление зависимостей раз в месяц
  workflow_dispatch:  # Возможность запуска вручную

env:
  PYTHON_VERSION: '3.12'
  CI_DEBUG: true
  POETRY_VERSION: '1.8.4'
  PYINSTALLER_VERSION: '6.11.1'

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Clean Poetry installation
        run: |
          rm -rf ~/.config/pypoetry
          rm -rf ~/.local/share/pypoetry
          rm -rf ~/.cache/pypoetry
        shell: bash

      - name: Install and configure Poetry
        run: |
          curl -sSL https://install.python-poetry.org | POETRY_HOME=$HOME/.local python3 - --version ${{ env.POETRY_VERSION }}
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        shell: bash

      - name: Set Poetry config
        run: |
          poetry config virtualenvs.in-project true --local
        shell: bash

      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root
        shell: bash

      - name: Update dependencies
        run: |
          poetry update
          poetry run pip install "pyinstaller==${{ env.PYINSTALLER_VERSION }}"
        shell: bash

      - name: Configure Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
        shell: bash

      - name: Commit and push changes
        run: |
          if [[ -n "$(git status --porcelain poetry.lock)" ]]; then
            git add poetry.lock
            git commit -m "chore: update dependencies [skip ci]"
            git push origin ${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi
        shell: bash
