name: Update dependencies

on:
  schedule:
    - cron: "0 0 1 * *"  # Пример расписания для обновления зависимостей раз в месяц
  workflow_dispatch:  # Также можно запускать вручную

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Устанавливаем Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Шаг 3: Кэширование зависимостей Poetry
      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      # Шаг 4: Устанавливаем Poetry
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Шаг 5: Устанавливаем зависимости проекта
      - name: Install dependencies with Poetry
        run: poetry install

      # Шаг 6: Обновляем зависимости
      - name: Update dependencies with Poetry
        run: |
          poetry update
          poetry show --outdated

      # Шаг 7: Запускаем тесты
      - name: Run tests
        run: poetry run pytest

      # Шаг 8: Настраиваем пользователя Git
      - name: Configure Git user
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      # Шаг 9: Создаем или переключаемся на ветку update-dependencies
      - name: Checkout or create update-dependencies branch
        run: |
          git fetch origin
          if git show-ref --verify --quiet refs/heads/update-dependencies; then
            git checkout update-dependencies
          else
            git checkout -b update-dependencies
          fi

      # Шаг 10: Коммитим изменения
      - name: Commit updated dependencies
        run: |
          git add poetry.lock
          git commit -m "Update dependencies" || echo "No changes to commit"

      # Шаг 11: Пушим изменения в удаленный репозиторий
      - name: Push changes
        run: |
          git push origin update-dependencies || echo "No changes to push"

      # Шаг 12: Создаем Pull Request
      - name: Create pull request with updated dependencies
        uses: peter-evans/create-pull-request@v5
        with:
          branch: update-dependencies
          title: "Update dependencies"
          body: |
            This PR updates dependencies to their latest versions.
            
            Updated packages:
            ```
            $(poetry show --outdated)
            ```
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "[create-pull-request] automated change"
          committer: GitHub <noreply@github.com>
          author: civisrom <civisrom@users.noreply.github.com>
          base: main
          labels: |
            dependencies
            automated pr
          signoff: false
          delete-branch: false
          draft: false
