name: Update Dependencies

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
    # Шаг 1: Устанавливаем Python 3.11
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Шаг 2: Устанавливаем Poetry
    - name: Install Poetry
      run: |
        curl -sSL https://install.python-poetry.org | python3 -
        export PATH="$HOME/.local/bin:$PATH"

    # Шаг 3: Клонируем репозиторий
    - name: Checkout repository
      uses: actions/checkout@v3

    # Шаг 4: Устанавливаем зависимости проекта с помощью Poetry
    - name: Install dependencies
      run: poetry install

    # Шаг 5: Обновляем зависимости проекта
    - name: Update dependencies
      run: poetry update

    # Шаг 6: Создаем новый коммит с обновленным poetry.lock
    - name: Commit updated poetry.lock
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add poetry.lock
        git commit -m "Update dependencies"
        git push origin update-dependencies

    # Шаг 7: Создаем Pull Request (если изменений нет, этот шаг будет пропущен)
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        branch: update-dependencies
        title: "Update dependencies"
        body: "This PR updates dependencies to their latest versions."
        commit-message: "[create-pull-request] automated change"
        committer: "GitHub <noreply@github.com>"
        author: "civisrom <civisrom@users.noreply.github.com>"
        delete-branch: false
        draft: false
