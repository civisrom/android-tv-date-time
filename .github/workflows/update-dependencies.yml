name: Update dependencies

on:
  schedule:
    - cron: "0 0 1 * *"  # Обновление зависимостей раз в месяц
  workflow_dispatch:  # Возможность запуска вручную

env:
  PYTHON_VERSION: '3.12'
  CI_DEBUG: true
  POETRY_VERSION: '1.8.4'
  PYINSTALLER_VERSION: '6.11.1'
  POETRY_VIRTUALENVS_CREATE: true
  POETRY_VIRTUALENVS_IN_PROJECT: true

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==${{ env.POETRY_VERSION }}"
        shell: bash

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Update dependencies
        run: |
          # Проверяем конфигурацию Poetry
          poetry --version
          poetry env info
          
          # Обновляем зависимости
          poetry update
          
          # Проверяем, есть ли изменения в poetry.lock
          if [[ -n "$(git status --porcelain poetry.lock)" ]]; then
            echo "Changes detected in poetry.lock"
            # Устанавливаем обновленные зависимости
            poetry install --no-interaction --with dev --all-extras
            poetry run pip install "pyinstaller==${{ env.PYINSTALLER_VERSION }}"
          else
            echo "No changes in poetry.lock"
          fi
        shell: bash
        env:
          POETRY_VIRTUALENVS_CREATE: true
          POETRY_VIRTUALENVS_IN_PROJECT: true

      - name: Configure Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
        shell: bash

      - name: Commit and push changes
        run: |
          if [[ -n "$(git status --porcelain poetry.lock)" ]]; then
            git add poetry.lock
            git commit -m "chore: update dependencies [skip ci]"
            git push origin ${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi
        shell: bash
