name: Update dependencies

on:
  schedule:
    - cron: "0 0 1 * *"  # Обновление зависимостей раз в месяц
  workflow_dispatch:  # Возможность запуска вручную

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Устанавливаем Python 3.12
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Шаг 2.1: Очищаем кэш Poetry
      - name: Clear Poetry cache
        run: |
          rm -rf ~/.cache/pypoetry

      # Шаг 3: Кэшируем зависимости Poetry
      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Setup Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true
      
      - name: Add Poetry to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH  # Добавляем Poetry в PATH
        shell: bash
      
      - name: Add Poetry to PATH (Windows)
        run: echo "$env:USERPROFILE\\.local\\bin" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
        shell: pwsh
      
      - name: Verify Poetry installation
        run: poetry --version  # Проверяем установку Poetry
        
      - name: Set Python version for Poetry
        run: poetry env use python3.12  # Указываем версию Python для Poetry

      # Шаг 5: Принудительное обновление зависимостей
      - name: Update dependencies
        run: |
          poetry self update
          poetry lock
          poetry install
          poetry update
        env:
          POETRY_CACHE_DIR: ~/.cache/pypoetry  # Используем кэш Poetry

      # Шаг 6: Настраиваем пользователя Git
      - name: Configure Git user
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      # Шаг 7: Проверяем изменения и пушим их
      - name: Commit and push changes to main
        run: |
          git add poetry.lock
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update dependencies"
            git push origin main
          fi
