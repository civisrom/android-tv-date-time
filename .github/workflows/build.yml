name: Build AndroidTVTimeFixer

on:
  push:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: AndroidTVTimeFixer
  SOURCE_FILE: android_time_fixer.py
  CI_DEBUG: true
  POETRY_VERSION: '1.7.1'
  PYINSTALLER_VERSION: '6.11.0'

jobs:
  setup-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            extension: .exe
            platform: windows
          - os: ubuntu-latest
            extension: ''
            platform: linux
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45  # Увеличено время для надежности
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          check-latest: true
          cache: 'pip'
          cache-dependency-path: |
            **/poetry.lock
            **/requirements*.txt

      # Расширенная установка системных зависимостей для Linux
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev
          sudo apt-get install -y libudev-dev libusb-1.0-0-dev
          sudo apt-get install -y zlib1g-dev libjpeg-dev libpng-dev
          sudo apt-get install -y libxml2-dev libxslt1-dev
          sudo apt-get install -y libcurl4-openssl-dev
        shell: bash

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install poetry==${{ env.POETRY_VERSION }}
        shell: bash

      - name: Configure Poetry and verify installation
        run: |
          poetry config virtualenvs.in-project true
          poetry config virtualenvs.create true
          poetry --version
          poetry env info
        shell: bash

      # Кэширование зависимостей Poetry
      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install project dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          poetry install --no-interaction --only main --only windows --sync
          poetry run pip list
        shell: pwsh

      - name: Install project dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          poetry install --no-interaction --only main --sync
          poetry run pip list
        shell: bash

      # Улучшенная установка ADB для Windows
      - name: Install ADB (Windows)
        if: runner.os == 'Windows'
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $adbDir = "$env:USERPROFILE\adb"
          New-Item -ItemType Directory -Force -Path $adbDir
          $platformToolsUrl = "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
          
          Write-Host "Downloading platform-tools..."
          Invoke-WebRequest -Uri $platformToolsUrl -OutFile "$adbDir\platform-tools.zip"
          
          Write-Host "Extracting platform-tools..."
          Expand-Archive -Path "$adbDir\platform-tools.zip" -DestinationPath $adbDir -Force
          
          $adbPath = "$adbDir\platform-tools"
          if (-not (Test-Path "$adbPath\adb.exe")) {
              throw "ADB executable not found after extraction"
          }
          
          echo $adbPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "ADB_PATH=$adbPath\adb.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          
          Write-Host "ADB version:"
          & "$adbPath\adb.exe" version
        shell: pwsh

      # Улучшенная установка ADB для Linux
      - name: Install ADB (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb
          adb version
          echo "ADB_PATH=$(which adb)" >> $GITHUB_ENV
          if [ ! -f "$ADB_PATH" ]; then
            echo "ADB installation failed"
            exit 1
          fi
        shell: bash

      - name: Install PyInstaller
        run: |
          poetry run pip install pyinstaller==${{ env.PYINSTALLER_VERSION }}
          poetry run pip install pefile  # Дополнительная зависимость для Windows
          poetry run pyinstaller --version
        shell: bash

      # Улучшенная сборка для Windows
      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          poetry run pyinstaller --clean `
            --onefile `
            --console `
            --name=${{ env.APP_NAME }} `
            --add-binary "$env:ADB_PATH;." `
            --hidden-import=pyperclip `
            --hidden-import=colorama `
            --hidden-import=platformdirs `
            --hidden-import=packaging `
            --hidden-import=typing_extensions `
            --hidden-import=cryptography `
            --hidden-import=usb `
            --hidden-import=usb.core `
            --hidden-import=usb.util `
            --hidden-import=rsa `
            --hidden-import=aiofiles `
            --hidden-import=async_timeout `
            --hidden-import=asyncio `
            --hidden-import=socket `
            --hidden-import=subprocess `
            --hidden-import=threading `
            --hidden-import=pkg_resources `
            --hidden-import=setuptools `
            --hidden-import=pkg_resources.py2_warn `
            --collect-all adb_shell `
            --collect-all libusb1 `
            --collect-all async_timeout `
            --collect-all colorama `
            --collect-all aiofiles `
            --collect-all platformdirs `
            --collect-all typing_extensions `
            --collect-all rsa `
            --collect-all usb `
            --log-level=DEBUG `
            ${{ env.SOURCE_FILE }}
        shell: pwsh

      # Улучшенная сборка для Linux
      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: |
          poetry run pyinstaller --clean \
            --onefile \
            --console \
            --name=${{ env.APP_NAME }} \
            --add-binary "$ADB_PATH:." \
            --hidden-import=pyperclip \
            --hidden-import=colorama \
            --hidden-import=platformdirs \
            --hidden-import=packaging \
            --hidden-import=typing_extensions \
            --hidden-import=cryptography \
            --hidden-import=usb \
            --hidden-import=usb.core \
            --hidden-import=usb.util \
            --hidden-import=rsa \
            --hidden-import=aiofiles \
            --hidden-import=async_timeout \
            --hidden-import=asyncio \
            --hidden-import=socket \
            --hidden-import=subprocess \
            --hidden-import=threading \
            --hidden-import=pkg_resources \
            --hidden-import=setuptools \
            --collect-all adb_shell \
            --collect-all libusb1 \
            --collect-all async_timeout \
            --collect-all colorama \
            --collect-all aiofiles \
            --collect-all platformdirs \
            --collect-all typing_extensions \
            --collect-all rsa \
            --collect-all usb \
            --log-level=DEBUG \
            ${{ env.SOURCE_FILE }}
        shell: bash

      # Улучшенная упаковка сборки
      - name: Package build
        run: |
          cd dist
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a -tzip "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" "${{ env.APP_NAME }}${{ matrix.extension }}"
            7z t "${{ env.APP_NAME }}-${{ matrix.platform }}.zip"
          else
            chmod +x ${{ env.APP_NAME }}
            zip "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" "${{ env.APP_NAME }}"
            unzip -t "${{ env.APP_NAME }}-${{ matrix.platform }}.zip"
          fi
          cd ..
        shell: bash

      - name: Verify build
        run: |
          if [ ! -f "dist/${{ env.APP_NAME }}${{ matrix.extension }}" ]; then
            echo "Build file not found!"
            exit 1
          fi
          if [ ! -f "dist/${{ env.APP_NAME }}-${{ matrix.platform }}.zip" ]; then
            echo "ZIP file not found!"
            exit 1
          fi
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.platform }}.zip
          retention-days: 90
          if-no-files-found: error

  create-release:
    needs: setup-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify artifacts
        run: |
          ls -la dist/
          if [ ! -f "dist/${APP_NAME}-windows.zip" ] || [ ! -f "dist/${APP_NAME}-linux.zip" ]; then
            echo "Missing required artifacts!"
            exit 1
          fi
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*.zip
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
