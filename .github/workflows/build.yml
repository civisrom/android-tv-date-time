name: Build AndroidTVTimeFixer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Добавляем необходимые разрешения
permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    # Шаг 1: Клонировать репозиторий
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Шаг 2: Установить Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    # Шаг 3: Обновить pip, pyinstaller и adb-shell
    - name: Upgrade pip, pyinstaller, and adb-shell
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade pyinstaller
        pip install --upgrade adb-shell

    # Шаг 4: Сборка исполняемого файла с помощью PyInstaller
    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile --console --name=AndroidTVTimeFixer android_time_fixer.py

    # Шаг 5: Сохранение артефакта как артефакт Workflow
    - name: Upload executable as workflow artifact
      uses: actions/upload-artifact@v4
      with:
        name: AndroidTVTimeFixer
        path: dist/AndroidTVTimeFixer.exe

    # Шаг 6: Создаем версию если её нет
    - name: Create version if not exists
      shell: bash
      run: |
        if [ ! -f "version.txt" ]; then
          echo "v1.0.0" > version.txt
          echo "Created version.txt with v1.0.0"
        fi

    # Шаг 7: Чтение тега из файла version.txt
    - name: Read version tag
      id: version
      shell: bash
      run: |
        VERSION=$(cat version.txt)
        echo "Reading version: $VERSION"
        echo "VERSION_TAG=$VERSION" >> $GITHUB_OUTPUT

    # Шаг 8: Вывод отладочной информации
    - name: Debug Info
      run: |
        echo "Current branch: ${{ github.ref }}"
        echo "Version tag: ${{ steps.version.outputs.VERSION_TAG }}"
        echo "Checking if file exists:"
        ls -la dist/AndroidTVTimeFixer.exe

    # Шаг 9: Создать релиз с новой версией
    - name: Create Release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: dist/AndroidTVTimeFixer.exe
        tag_name: ${{ steps.version.outputs.VERSION_TAG }}
        name: 'AndroidTVTimeFixer ${{ steps.version.outputs.VERSION_TAG }}'
        body: |
          Release version ${{ steps.version.outputs.VERSION_TAG }}
          
          Включает:
          - Исполняемый файл AndroidTVTimeFixer.exe
        draft: false
        prerelease: false
