name: Build AndroidTVTimeFixer

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  actions: write

env:
  PYTHON_VERSION: '3.12'
  APP_NAME: AndroidTVTimeFixer
  SOURCE_FILE: android_time_fixer.py
  CI_DEBUG: true
  POETRY_VERSION: '1.8.4'
  PYINSTALLER_VERSION: '6.11.1'
  ADB_VERSION: '35.0.2'

jobs:
  setup-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/AppData/Local/pypoetry/Cache
            ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-${{ env.PYTHON_VERSION }}-
            ${{ runner.os }}-poetry-

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry==${{ env.POETRY_VERSION }}
        shell: bash

      - name: Configure Poetry Environment
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            python -m poetry env use "$env:pythonLocation\python.exe"
          else
            python -m poetry env use $(which python)
          fi
          python -m poetry config virtualenvs.create true
          python -m poetry config virtualenvs.in-project true
        shell: bash

      - name: Install Dependencies
        run: |
          python -m poetry install --no-interaction --no-root
          python -m poetry install --no-interaction --with dev --all-extras
          python -m poetry run pip install pyinstaller==${{ env.PYINSTALLER_VERSION }}
          python -m poetry run pip install psutil
          if [ "${{ runner.os }}" == "Windows" ]; then
            python -m poetry run pip install wmi
          fi
        shell: bash

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev libudev-dev zip unzip
        shell: bash

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl
        shell: bash

      - name: Update poetry.lock
        run: |
          poetry lock
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git diff --exit-code poetry.lock || (git add poetry.lock && git commit -m "Update poetry.lock" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Resources Directory and Setup ADB
        run: |
          mkdir -p resources
          mkdir -p temp_adb
          
          if [ "${{ runner.os }}" == "Windows" ]; then
            curl -L https://dl.google.com/android/repository/platform-tools-latest-windows.zip -o temp_adb/platform-tools.zip
            unzip temp_adb/platform-tools.zip -d temp_adb/
            cp temp_adb/platform-tools/adb.exe ./resources/
            cp temp_adb/platform-tools/AdbWinApi.dll ./resources/
            cp temp_adb/platform-tools/AdbWinUsbApi.dll ./resources/
          elif [ "${{ runner.os }}" == "Darwin" ]; then
            curl -L https://dl.google.com/android/repository/platform-tools-latest-darwin.zip -o temp_adb/platform-tools.zip
            unzip temp_adb/platform-tools.zip -d temp_adb/
            cp temp_adb/platform-tools/adb ./resources/
            chmod +x ./resources/adb
          else
            curl -L https://dl.google.com/android/repository/platform-tools-latest-linux.zip -o temp_adb/platform-tools.zip
            unzip temp_adb/platform-tools.zip -d temp_adb/
            cp temp_adb/platform-tools/adb ./resources/
            chmod +x ./resources/adb
          fi
          
          echo "ADB_RESOURCES_PATH=$PWD/resources" >> $GITHUB_ENV
        shell: bash

      - name: Run Linter
        run: |
          poetry run flake8 .
        continue-on-error: true

      - name: Run Tests
        run: |
          poetry run pytest
        continue-on-error: true

      - name: Build Executable
        run: |
          COMMON_ARGS="--clean --onefile --console --name=${{ env.APP_NAME }} \
            --hidden-import=pyperclip \
            --hidden-import=colorama \
            --hidden-import=platformdirs \
            --hidden-import=packaging \
            --hidden-import=typing_extensions \
            --hidden-import=cryptography \
            --hidden-import=rsa \
            --hidden-import=aiofiles \
            --hidden-import=async_timeout \
            --hidden-import=asyncio \
            --hidden-import=socket \
            --hidden-import=subprocess \
            --hidden-import=threading \
            --hidden-import=adb_shell.adb_device \
            --hidden-import=adb_shell.auth.sign_pythonrsa \
            --hidden-import=ntplib \
            --hidden-import=psutil \
            --collect-all ntplib \
            --collect-all adb_shell \
            --collect-all async_timeout \
            --collect-data colorama \
            --collect-data aiofiles \
            --collect-data platformdirs \
            --collect-data packaging \
            --collect-data typing_extensions \
            --collect-data cryptography \
            --log-level=DEBUG"

          if [ "${{ runner.os }}" == "Windows" ]; then
            ADD_DATA="--add-data=\"resources/adb.exe;resources/\" \
              --add-data=\"resources/AdbWinApi.dll;resources/\" \
              --add-data=\"resources/AdbWinUsbApi.dll;resources/\""
            HOOK="--runtime-hook=\"hooks/win_hook.py\""
          elif [ "${{ runner.os }}" == "Darwin" ]; then
            ADD_DATA="--add-data=\"resources/adb:resources/\""
            HOOK="--runtime-hook=\"hooks/macos_hook.py\""
          else
            ADD_DATA="--add-data=\"resources/adb:resources/\""
            HOOK="--runtime-hook=\"hooks/linux_hook.py\""
          fi

          poetry run pyinstaller $COMMON_ARGS $ADD_DATA $HOOK "${{ env.SOURCE_FILE }}"
        shell: bash

      - name: Package Build
        run: |
          cd dist
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a -tzip "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" "${{ env.APP_NAME }}.exe"
          else
            chmod +x ${{ env.APP_NAME }}
            zip -j "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" "${{ env.APP_NAME }}"
          fi
        shell: bash

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.platform }}.zip
          retention-days: 90
          if-no-files-found: error

  create-release:
    needs: setup-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*.zip
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Release Notes
            
            ### Changes
            - Automated release from GitHub Actions
            - Built for Windows, Linux, and macOS
            
            ### Artifacts
            - AndroidTVTimeFixer-windows.zip
            - AndroidTVTimeFixer-linux.zip
            - AndroidTVTimeFixer-macos.zip
