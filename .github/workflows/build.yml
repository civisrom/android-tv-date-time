name: Build AndroidTVTimeFixer

on:
  push:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: AndroidTVTimeFixer
  SOURCE_FILE: android_time_fixer.py
  CI_DEBUG: true
  POETRY_VERSION: '1.7.1'
  PYINSTALLER_VERSION: '6.11.0'

jobs:
  setup-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            extension: .exe
            platform: windows
          - os: ubuntu-latest
            extension: ''
            platform: linux
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45  # Увеличено время таймаута
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          check-latest: true
          cache: 'pip'
          cache-dependency-path: |
            **/poetry.lock
            **/pyproject.toml

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev
          sudo apt-get install -y libudev-dev libusb-1.0-0-dev
          sudo apt-get install -y zip unzip
        shell: bash

      - name: Setup Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Add Poetry to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Улучшенное кэширование зависимостей
      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/AppData/Local/pypoetry/Cache
            ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}-
            ${{ runner.os }}-poetry-

      - name: Install project dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --with dev --all-extras
          poetry run pip install pyinstaller==${{ env.PYINSTALLER_VERSION }}
        shell: bash

      - name: Install ADB (Windows)
        if: runner.os == 'Windows'
        run: |
          $ProgressPreference = 'SilentlyContinue'
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\adb"
          $platformToolsUrl = "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
          Invoke-WebRequest -Uri $platformToolsUrl -OutFile "$env:USERPROFILE\adb\platform-tools.zip"
          Expand-Archive -Path "$env:USERPROFILE\adb\platform-tools.zip" -DestinationPath "$env:USERPROFILE\adb" -Force
          $adbPath = "$env:USERPROFILE\adb\platform-tools"
          echo $adbPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "ADB_PATH=$adbPath\adb.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Install ADB (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb
          echo "ADB_PATH=$(which adb)" >> $GITHUB_ENV
        shell: bash

      - name: Verify Python environment
        run: |
          poetry run python -V
          poetry run pip list
          poetry run pip check
        shell: bash

      # Общие параметры для PyInstaller
      - name: Set PyInstaller params
        id: pyinstaller-params
        run: |
          COMMON_PARAMS="--clean --onefile --console --name=${{ env.APP_NAME }} \
            --hidden-import=pyperclip \
            --hidden-import=colorama \
            --hidden-import=platformdirs \
            --hidden-import=packaging \
            --hidden-import=typing_extensions \
            --hidden-import=cryptography \
            --hidden-import=usb \
            --hidden-import=usb.core \
            --hidden-import=usb.util \
            --hidden-import=rsa \
            --hidden-import=aiofiles \
            --hidden-import=async_timeout \
            --hidden-import=asyncio \
            --hidden-import=socket \
            --hidden-import=subprocess \
            --hidden-import=threading \
            --hidden-import=adb_shell.adb_device \
            --hidden-import=adb_shell.auth.sign_pythonrsa \
            --collect-all adb_shell \
            --collect-all libusb1 \
            --collect-all async_timeout \
            --collect-data colorama \
            --collect-data aiofiles \
            --collect-data platformdirs \
            --collect-data packaging \
            --collect-data typing_extensions \
            --collect-data cryptography \
            --log-level=DEBUG"
          echo "params=$COMMON_PARAMS" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          poetry run pyinstaller ${{ steps.pyinstaller-params.outputs.params }} `
            --add-binary "$env:ADB_PATH;." `
            --runtime-hook="hooks/win_hook.py" `
            ${{ env.SOURCE_FILE }}
        shell: pwsh

      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: |
          poetry run pyinstaller ${{ steps.pyinstaller-params.outputs.params }} \
            --add-binary "$ADB_PATH:." \
            --runtime-hook="hooks/linux_hook.py" \
            ${{ env.SOURCE_FILE }}
        shell: bash

      - name: Test built executable
        run: |
          cd dist
          if [ "${{ runner.os }}" == "Windows" ]; then
            ./${{ env.APP_NAME }}.exe --version || true
          else
            chmod +x ${{ env.APP_NAME }}
            ./${{ env.APP_NAME }} --version || true
          fi
        shell: bash
        continue-on-error: true

      - name: Package build
        run: |
          cd dist
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a -tzip "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" "${{ env.APP_NAME }}${{ matrix.extension }}"
          else
            chmod +x ${{ env.APP_NAME }}
            zip -j "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" "${{ env.APP_NAME }}"
          fi
          cd ..
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.platform }}.zip
          retention-days: 90
          if-no-files-found: error

  create-release:
    needs: setup-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*.zip
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
