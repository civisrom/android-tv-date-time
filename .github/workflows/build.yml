name: Build AndroidTVTimeFixer

on:
  push:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

env:
  PYTHON_VERSION: '3.13'
  APP_NAME: AndroidTVTimeFixer
  SOURCE_FILE: android_time_fixer.py
  CI_DEBUG: true

jobs:
  setup-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            extension: .exe
            platform: windows
          - os: ubuntu-latest
            extension: ''
            platform: linux
          - os: macos-latest
            extension: ''
            platform: macos
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          check-latest: true
          cache: 'pip'
          
      - name: Установка Android Platform Tools
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile "platform-tools.zip"
          Expand-Archive -Path "platform-tools.zip" -DestinationPath $env:TEMP
          $env:PATH = "$env:TEMP\platform-tools;$env:PATH"
          
      - name: Install Poetry (Windows)
        if: runner.os == 'Windows'
        run: |
          (Invoke-WebRequest -Uri https://install.python-poetry.org -UseBasicParsing).Content | py -
          echo "$env:APPDATA\Python\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Install Poetry (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.poetry/bin" >> $GITHUB_PATH
        shell: bash

      - name: Configure Poetry
        if: runner.os != 'Windows'
        run: |
          poetry config virtualenvs.in-project true
          poetry config virtualenvs.create true
          poetry --version
        shell: bash

      - name: Configure Poetry (Windows)
        if: runner.os == 'Windows'
        run: |
          poetry config virtualenvs.in-project true
          poetry config virtualenvs.create true
          poetry --version
        shell: pwsh

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pywin32==306
          poetry install --no-interaction --no-root
          pip install pyinstaller

      - name: Install dependencies (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          poetry install --no-interaction --no-root --with dev
          poetry run pip install --upgrade pip setuptools wheel

      - name: Export requirements
        run: poetry export -f requirements.txt --output requirements.txt --without-hashes

      - name: Install ADB drivers (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\adb"
          cd "$env:USERPROFILE\adb"
          $platformToolsUrl = "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
          Invoke-WebRequest -Uri $platformToolsUrl -OutFile "platform-tools.zip"
          Expand-Archive -Path "platform-tools.zip" -DestinationPath "."
          $env:Path += ";$env:USERPROFILE\adb\platform-tools"
          [Environment]::SetEnvironmentVariable("Path", $env:Path, [System.EnvironmentVariableTarget]::User)
          adb version

      - name: Install ADB (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb
          sudo apt-get install -y libusb-1.0-0-dev
          adb version

      - name: Install ADB (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install android-platform-tools
          brew install libusb
          adb version

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --clean `
                     --onefile `
                     --console `
                     --name=${{ env.APP_NAME }} `
                     --add-binary "$(Get-Command adb).Path;." `
                     --log-level=DEBUG `
                     ${{ env.SOURCE_FILE }}

      - name: Build executable (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          poetry run pyinstaller --clean \
                     --onefile \
                     --console \
                     --name=${{ env.APP_NAME }} \
                     --add-binary "$(which adb):." \
                     --log-level=DEBUG \
                     ${{ env.SOURCE_FILE }}

      - name: Package build
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            zip ${{ env.APP_NAME }}-${{ matrix.platform }}.zip ${{ env.APP_NAME }}${{ matrix.extension }}
          else
            chmod +x ${{ env.APP_NAME }}
            zip ${{ env.APP_NAME }}-${{ matrix.platform }}.zip ${{ env.APP_NAME }}
          fi
          cd ..

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.platform }}.zip
          retention-days: 90
          if-no-files-found: error

  create-release:
    needs: setup-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*.zip
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
