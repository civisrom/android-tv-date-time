name: Build AndroidTVTimeFixer

on:
  push:
    branches:
      - main  # Запускать сборку при пуше в ветку main
  pull_request:
    branches:
      - main  # Запускать сборку при pull request в ветку main
  workflow_dispatch:  # Добавляем это для ручного запуска
  
jobs:
  build:
    runs-on: windows-latest  # Используем Windows для сборки

    steps:
    # Шаг 1: Проверить репозиторий
    - name: Checkout repository
      uses: actions/checkout@v4

    # Шаг 2: Установить Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'  # Укажите версию Python, которую вы используете

    # Шаг 3: Установить зависимости
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller adb-shell

    # Шаг 4: Сборка исполняемого файла с помощью PyInstaller
    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile --console --name=AndroidTVTimeFixer android_time_fixer.py

    # Шаг 5: Загрузить артефакт (исполняемый файл) как артефакт сборки
    - name: Upload executable as artifact
      uses: actions/upload-artifact@v4
      with:
        name: AndroidTVTimeFixer
        path: dist/AndroidTVTimeFixer.exe  # Путь к файлу в папке dist

    # Шаг 6: Опубликовать артефакт как релиз (только при пуше в main)
    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main'
      uses: actions/create-release@v1
      with:
        tag_name: 'v1.0.0'  # Укажите нужный номер версии
        release_name: 'AndroidTVTimeFixer Release v1.0.0'
        draft: false
        prerelease: false
        body: |
          Первый релиз AndroidTVTimeFixer, включающий исправление времени на Android TV.

    - name: Upload release asset
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.create-release.outputs.upload_url }}
        asset_path: dist/AndroidTVTimeFixer.exe
        asset_name: AndroidTVTimeFixer.exe
        label: "AndroidTVTimeFixer Executable"
