name: Build AndroidTVTimeFixer

on:
  push:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

env:
  PYTHON_VERSION: '3.11'  # Изменили версию Python на более стабильную
  APP_NAME: AndroidTVTimeFixer
  SOURCE_FILE: android_time_fixer.py
  CI_DEBUG: true

jobs:
  setup-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            extension: .exe
            platform: windows
          - os: ubuntu-latest
            extension: ''
            platform: linux
          - os: macos-latest
            extension: ''
            platform: macos
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          check-latest: true
          cache: 'pip'

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev
          sudo apt-get install -y libudev-dev libusb-1.0-0-dev
        shell: bash

      - name: Install system dependencies (macOS)
        if: runner.os == 'Darwin'
        run: |
          brew install openssl libffi libusb
        shell: bash

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry==1.7.1
        shell: bash

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.in-project true
          poetry config virtualenvs.create true
        shell: bash

      - name: Install project dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          poetry install --no-interaction --only main --only windows
        shell: pwsh

      - name: Install project dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          poetry install --no-interaction --only main
        shell: bash

      - name: Install ADB (Windows)
        if: runner.os == 'Windows'
        run: |
          $ProgressPreference = 'SilentlyContinue'
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\adb"
          $platformToolsUrl = "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
          Invoke-WebRequest -Uri $platformToolsUrl -OutFile "$env:USERPROFILE\adb\platform-tools.zip"
          Expand-Archive -Path "$env:USERPROFILE\adb\platform-tools.zip" -DestinationPath "$env:USERPROFILE\adb"
          $adbPath = "$env:USERPROFILE\adb\platform-tools"
          echo $adbPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "ADB_PATH=$adbPath\adb.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Install ADB (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb
          echo "ADB_PATH=$(which adb)" >> $GITHUB_ENV
        shell: bash

      - name: Install ADB (macOS)
        if: runner.os == 'Darwin'
        run: |
          brew install android-platform-tools
          echo "ADB_PATH=$(which adb)" >> $GITHUB_ENV
        shell: bash

      - name: Install PyInstaller
        run: |
          poetry run pip install pyinstaller==6.11.0
        shell: bash

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          poetry run pyinstaller --clean `
            --onefile `
            --console `
            --name=${{ env.APP_NAME }} `
            --add-binary "$env:ADB_PATH;." `
            --hidden-import=pyperclip `
            --hidden-import=colorama `
            --hidden-import=platformdirs `
            --hidden-import=packaging `
            --hidden-import=typing_extensions `
            --hidden-import=cryptography `
            --hidden-import=usb `
            --hidden-import=usb.core `
            --hidden-import=usb.util `
            --hidden-import=rsa `
            --collect-all adb_shell `
            --collect-all libusb1 `
            --collect-data colorama `
            --log-level=DEBUG `
            ${{ env.SOURCE_FILE }}
        shell: pwsh

      - name: Build executable (Unix)
        if: runner.os != 'Windows'
        run: |
          poetry run pyinstaller --clean \
            --onefile \
            --console \
            --name=${{ env.APP_NAME }} \
            --add-binary "$ADB_PATH:." \
            --hidden-import=pyperclip \
            --hidden-import=colorama \
            --hidden-import=platformdirs \
            --hidden-import=packaging \
            --hidden-import=typing_extensions \
            --hidden-import=cryptography \
            --hidden-import=usb \
            --hidden-import=usb.core \
            --hidden-import=usb.util \
            --hidden-import=rsa \
            --collect-all adb_shell \
            --collect-all libusb1 \
            --collect-data colorama \
            --log-level=DEBUG \
            ${{ env.SOURCE_FILE }}
        shell: bash

      - name: Package build
        run: |
          cd dist
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" "${{ env.APP_NAME }}${{ matrix.extension }}"
          else
            chmod +x ${{ env.APP_NAME }}
            zip "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" "${{ env.APP_NAME }}"
          fi
          cd ..
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.platform }}.zip
          retention-days: 90
          if-no-files-found: error

  create-release:
    needs: setup-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*.zip
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
