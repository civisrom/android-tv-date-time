name: Build AndroidTVTimeFixer

on:
  push:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: AndroidTVTimeFixer
  SOURCE_FILE: android_time_fixer.py
  CI_DEBUG: true

jobs:
  setup-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            extension: .exe
            platform: windows
          - os: ubuntu-latest
            extension: ''
            platform: linux
          - os: macos-latest
            extension: ''
            platform: macos
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          check-latest: true
          cache: 'pip'

      - name: Install Poetry (Windows)
        if: runner.os == 'Windows'
        run: |
          $poetryPath = "$env:USERPROFILE\.poetry\bin"
          if (-not (Test-Path $poetryPath)) {
            Invoke-WebRequest -Uri https://install.python-poetry.org | python -
          }
          $env:PATH += ";$poetryPath"
          echo $env:PATH  # Проверка PATH на Windows
          where poetry  # На Windows используем where
          poetry --version  # Проверка версии Poetry
        shell: pwsh

      - name: Add Poetry to PATH (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          export PATH="$HOME/.poetry/bin:$PATH"
          echo $PATH  # Проверка PATH после добавления Poetry
          which poetry  # Проверка доступности Poetry
          poetry --version  # Проверка версии Poetry

      - name: Install Poetry (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:PATH += ";$env:USERPROFILE\.poetry\bin"
          echo $env:PATH  # Проверка PATH на Windows
          where poetry  # На Windows используем where
          poetry --version  # Проверка версии Poetry

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: |
          poetry install --no-interaction --no-root
          poetry run pip install --upgrade pip setuptools wheel
          poetry run pip install pyinstaller

      - name: Export requirements
        run: poetry export -f requirements.txt --output requirements.txt --without-hashes

      - name: Install ADB drivers (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\adb"
          cd "$env:USERPROFILE\adb"
          $platformToolsUrl = "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
          Invoke-WebRequest -Uri $platformToolsUrl -OutFile "platform-tools.zip"
          Expand-Archive -Path "platform-tools.zip" -DestinationPath "."
          $env:Path += ";$env:USERPROFILE\adb\platform-tools"
          [Environment]::SetEnvironmentVariable("Path", $env:Path, [System.EnvironmentVariableTarget]::User)
          adb version

      - name: Install ADB (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb
          sudo apt-get install -y libusb-1.0-0-dev
          adb version

      - name: Install ADB (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install android-platform-tools
          brew install libusb
          adb version

      - name: Build executable
        shell: bash
        run: |
          poetry run pyinstaller --clean \
                     --onefile \
                     --console \
                     --name=${{ env.APP_NAME }} \
                     --add-binary "$(which adb):." \
                     --log-level=DEBUG \
                     ${{ env.SOURCE_FILE }}

      - name: Package build
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            zip ${{ env.APP_NAME }}-${{ matrix.platform }}.zip ${{ env.APP_NAME }}${{ matrix.extension }}
          else
            chmod +x ${{ env.APP_NAME }}
            zip ${{ env.APP_NAME }}-${{ matrix.platform }}.zip ${{ env.APP_NAME }}
          fi
          cd ..

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.platform }}.zip
          retention-days: 90
          if-no-files-found: error

  create-release:
    needs: setup-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*.zip
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
