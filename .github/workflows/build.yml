name: Build AndroidTVTimeFixer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  actions: write

env:
  PYTHON_VERSION: '3.12'
  APP_NAME: AndroidTVTimeFixer
  SOURCE_FILE: android_time_fixer.py
  CI_DEBUG: true
  POETRY_VERSION: '1.8.4'
  PYINSTALLER_VERSION: '6.11.1'
  ADB_VERSION: '35.0.2'

jobs:
  setup-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/AppData/Local/pypoetry/Cache
            ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-${{ env.PYTHON_VERSION }}-
            ${{ runner.os }}-poetry-

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry==${{ env.POETRY_VERSION }}
        shell: bash

      - name: Configure Poetry Environment (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m poetry env use "$env:pythonLocation\python.exe"
          python -m poetry config virtualenvs.create true
          python -m poetry config virtualenvs.in-project true

      - name: Configure Poetry Environment (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python -m poetry env use $(which python)
          python -m poetry config virtualenvs.create true
          python -m poetry config virtualenvs.in-project true

      - name: Install Dependencies
        run: |
          python -m poetry install --no-interaction --no-root
          python -m poetry install --no-interaction --with dev --all-extras
          python -m poetry run pip install pyinstaller==${{ env.PYINSTALLER_VERSION }}
          python -m poetry run pip install psutil
        shell: bash

      - name: Install Windows Dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m poetry run pip install wmi

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev libudev-dev zip unzip
        shell: bash

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl
        shell: bash

      - name: Create Resources Directory and Setup ADB
        shell: bash
        run: |
          # Создаем директории
          mkdir -p resources
          mkdir -p temp_adb
          
          if [ "${{ runner.os }}" == "Windows" ]; then
            curl -L https://dl.google.com/android/repository/platform-tools-latest-windows.zip -o temp_adb/platform-tools.zip
            unzip -o temp_adb/platform-tools.zip -d temp_adb/
            cp "temp_adb/platform-tools/adb.exe" "resources/adb.exe"
            cp "temp_adb/platform-tools/AdbWinApi.dll" "resources/AdbWinApi.dll"
            cp "temp_adb/platform-tools/AdbWinUsbApi.dll" "resources/AdbWinUsbApi.dll"
          elif [ "${{ runner.os }}" == "Darwin" ]; then
            curl -L https://dl.google.com/android/repository/platform-tools-latest-darwin.zip -o temp_adb/platform-tools.zip
            unzip -o temp_adb/platform-tools.zip -d temp_adb/
            cp "temp_adb/platform-tools/adb" "resources/adb"
            chmod +x "resources/adb"
          else
            curl -L https://dl.google.com/android/repository/platform-tools-latest-linux.zip -o temp_adb/platform-tools.zip
            unzip -o temp_adb/platform-tools.zip -d temp_adb/
            cp "temp_adb/platform-tools/adb" "resources/adb"
            chmod +x "resources/adb"
          fi
          
          echo "Contents of resources directory:"
          ls -la resources/

      - name: Create PyInstaller Spec
        shell: bash
        run: |
          cat > pyinstaller.spec << 'EOF'
          # -*- mode: python ; coding: utf-8 -*-
          import sys

          a = Analysis(
              ['android_time_fixer.py'],
              pathex=[],
              binaries=[],
              datas=[],
              hiddenimports=[
                  'pyperclip',
                  'colorama',
                  'platformdirs',
                  'packaging',
                  'typing_extensions',
                  'cryptography',
                  'rsa',
                  'aiofiles',
                  'async_timeout',
                  'asyncio',
                  'socket',
                  'subprocess',
                  'threading',
                  'adb_shell.adb_device',
                  'adb_shell.auth.sign_pythonrsa',
                  'ntplib',
                  'psutil'
              ],
              hookspath=[],
              hooksconfig={},
              runtime_hooks=['hooks/win_hook.py'] if sys.platform == 'win32' else 
                          ['hooks/macos_hook.py'] if sys.platform == 'darwin' else 
                          ['hooks/linux_hook.py'],
              excludes=[
                  'tkinter',
                  'unittest',
                  'pdb',
                  'difflib',
                  'doctest',
                  'xml',
                  'pydoc',
                  'inspect',
                  'test',
                  '_pytest',
                  'pytest',
                  'pip',
                  'setuptools',
                  'pkg_resources',
                  'distutils',
                  'email',
                  'html',
                  'http',
                  'logging',
                  'multiprocessing',
                  'unittest',
                  'urllib',
                  'xml',
                  'xmlrpc',
                  'win32com',
                  'win32api',
                  'win32gui'
              ],
              win_no_prefer_redirects=False,
              win_private_assemblies=False,
              cipher=None,
              noarchive=False
          )

          # Add platform-specific data files
          if sys.platform == 'win32':
              a.datas += [
                  ('resources/adb.exe', 'resources/adb.exe', 'DATA'),
                  ('resources/AdbWinApi.dll', 'resources/AdbWinApi.dll', 'DATA'),
                  ('resources/AdbWinUsbApi.dll', 'resources/AdbWinUsbApi.dll', 'DATA')
              ]
          else:
              a.datas += [
                  ('resources/adb', 'resources/adb', 'DATA')
              ]

          # Bundle external shared libraries
          a.binaries = [b for b in a.binaries if not b[0].startswith('api-ms-win')]

          pyz = PYZ(a.pure, a.zipped_data, cipher=None)

          exe = EXE(
              pyz,
              a.scripts,
              a.binaries,
              a.zipfiles,
              a.datas,
              [],
              name='AndroidTVTimeFixer',
              debug=False,
              bootloader_ignore_signals=False,
              strip=True,
              upx=False,
              upx_exclude=['vcruntime140.dll', 'python*.dll'],
              runtime_tmpdir=None,
              console=True,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
          )
          EOF

      - name: Build Executable
        shell: bash
        run: |
          # Сборка с использованием spec файла
          poetry run pyinstaller --clean pyinstaller.spec
          
          # Очистка временных файлов после сборки
          rm -rf build/
          rm -rf __pycache__/
          find . -type d -name "__pycache__" -exec rm -r {} +
          find . -type d -name "*.egg-info" -exec rm -r {} +
          find . -type f -name "*.pyc" -delete

      - name: Package Build
        run: |
          cd dist
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a -tzip "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" "${{ env.APP_NAME }}.exe"
          else
            chmod +x ${{ env.APP_NAME }}
            zip -j "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" "${{ env.APP_NAME }}"
          fi
        shell: bash

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.platform }}.zip
          retention-days: 90
          if-no-files-found: error

  create-release:
    needs: setup-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*.zip
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true