name: Build AndroidTVTimeFixer

on:
  push:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

env:
  PYTHON_VERSION: '3.13'
  APP_NAME: AndroidTVTimeFixer
  SOURCE_FILE: android_time_fixer.py
  CI_DEBUG: true

jobs:
  generate-requirements:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install pipreqs
        run: pip install pipreqs
        
      - name: Generate requirements.txt
        run: |
          pipreqs . --force
          
      - name: Commit requirements.txt
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add requirements.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generate requirements.txt"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: generate-requirements
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            extension: .exe
            separator: '\\'
          - os: ubuntu-latest
            extension: ''
            separator: '/'
          - os: macos-latest
            extension: ''
            separator: '/'
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        check-latest: true

    - name: Cache PyInstaller build
      uses: actions/cache@v4
      with:
        path: |
          build
          *.spec
        key: ${{ runner.os }}-pyinstaller-${{ hashFiles('*.py', 'requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pyinstaller-

    - name: Upgrade dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        pip install --upgrade --no-cache-dir -r requirements.txt pyinstaller

    - name: Verify CI environment
      shell: bash
      run: |
        echo "CI Environment Information:"
        echo "OS: ${{ runner.os }}"
        echo "Python Version: $(python --version)"
        echo "Disk Space:"
        df -h || true
        echo "Memory Info:"
        free -h || true
        echo "Environment Variables:"
        env | grep -i "github\|python\|ci" || true
        
    - name: Security scan dependencies
      run: |
        pip install safety
        safety check

    - name: Build executable with PyInstaller
      shell: bash
      run: |
        set -e
        export APP_PATH="dist/${{ env.APP_NAME }}${{ matrix.extension }}"
        
        echo "Starting PyInstaller build..."
        pyinstaller --clean \
                   --onefile \
                   --console \
                   --name=${{ env.APP_NAME }} \
                   --log-level=INFO \
                   --strip \
                   ${{ env.SOURCE_FILE }}
        
        if [ ! -f "$APP_PATH" ]; then
          echo "Error: Build failed - executable not found at $APP_PATH"
          exit 1
        fi
        
        echo "Build successful!"
        ls -lh "$APP_PATH"

    - name: Verify executable
      shell: bash
      run: |
        APP_PATH="dist/${{ env.APP_NAME }}${{ matrix.extension }}"
        
        echo "Verifying executable at $APP_PATH"
        if [ ! -f "$APP_PATH" ]; then
          echo "Error: Executable not found!"
          exit 1
        fi
        
        # Platform specific checks
        case "${{ runner.os }}" in
          "Windows")
            powershell -Command "Get-AuthenticodeSignature '$APP_PATH'"
            ;;
          "Linux")
            file "$APP_PATH"
            ldd "$APP_PATH" || true
            ;;
          "macOS")
            file "$APP_PATH"
            otool -L "$APP_PATH" || true
            ;;
        esac

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-${{ runner.os }}
        path: dist/${{ env.APP_NAME }}${{ matrix.extension }}
        retention-days: 90
        if-no-files-found: error

    - name: Process version
      id: version
      shell: bash
      run: |
        if [ ! -f "version.txt" ]; then
          echo "v1.0.0" > version.txt
          echo "Created version.txt with v1.0.0"
        fi
        
        VERSION=$(cat version.txt | tr -d '\r\n')
        
        if ! echo "$VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "Error: Invalid version format in version.txt: $VERSION"
          exit 1
        fi
        
        echo "VERSION_TAG=$VERSION" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: |
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
        matrix.os == 'windows-latest'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: |
          dist/${{ env.APP_NAME }}${{ matrix.extension }}
        tag_name: ${{ steps.version.outputs.VERSION_TAG }}
        name: '${{ env.APP_NAME }} ${{ steps.version.outputs.VERSION_TAG }}'
        body: |
          Release version ${{ steps.version.outputs.VERSION_TAG }}
          
          ### Что нового
          - Кросс-платформенная сборка для Windows, Linux и macOS
          - Улучшенная обработка ошибок и проверки
          - Автоматическая генерация requirements.txt
          
          ### Контрольная информация
          - Дата сборки: ${{ github.sha }}
          - Версия Python: ${{ env.PYTHON_VERSION }}
          - Платформа сборки: ${{ runner.os }}
          
          ### Установка
          1. Скачайте файл для вашей операционной системы
          2. Запустите программу от имени администратора (для Windows)
          3. Для Linux/macOS: `chmod +x ./${{ env.APP_NAME }} && ./${{ env.APP_NAME }}`
        draft: false
        prerelease: false
        generate_release_notes: true

    - name: Clean up
      if: always()
      shell: bash
      run: |
        echo "Cleaning up build artifacts..."
        rm -rf dist build *.spec
        echo "Cleanup complete"

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send build status
        run: |
          echo "Build completed with status: ${{ needs.build.result }}"
          # Here you can add notification logic (e.g., email, Slack, etc.)
