name: Build AndroidTVTimeFixer

on:
  push:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

env:
  PYTHON_VERSION: '3.13'
  APP_NAME: AndroidTVTimeFixer
  SOURCE_FILE: android_time_fixer.py
  CI_DEBUG: true

jobs:
  setup-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            extension: .exe
            platform: windows
          - os: ubuntu-latest
            extension: ''
            platform: linux
          - os: macos-latest
            extension: ''
            platform: macos
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          check-latest: true
          cache: 'pip'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Export requirements
        run: poetry export -f requirements.txt --output requirements.txt --without-hashes

      # Install platform-specific ADB tools
      - name: Install ADB drivers (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\adb"
          cd "$env:USERPROFILE\adb"
          
          $platformToolsUrl = "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
          Invoke-WebRequest -Uri $platformToolsUrl -OutFile "platform-tools.zip"
          
          Expand-Archive -Path "platform-tools.zip" -DestinationPath "."
          
          $env:Path += ";$env:USERPROFILE\adb\platform-tools"
          [Environment]::SetEnvironmentVariable("Path", $env:Path, [System.EnvironmentVariableTarget]::User)
          
          adb version

      - name: Install ADB (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb
          sudo apt-get install -y libusb-1.0-0-dev
          adb version

      - name: Install ADB (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install android-platform-tools
          brew install libusb
          adb version

      - name: Prepare cache directories
        shell: bash
        run: |
          mkdir -p build_cache
          mkdir -p spec_cache
          
          if [ -d "build" ]; then
            cp -r build/* build_cache/ || true
          fi
          
          if [ -f "*.spec" ]; then
            cp *.spec spec_cache/ || true
          fi

      - name: Cache PyInstaller build
        uses: actions/cache@v4
        with:
          path: |
            build_cache
            spec_cache
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('*.py', 'poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-

      - name: Restore cache to build directory
        shell: bash
        run: |
          if [ -d "build_cache" ] && [ "$(ls -A build_cache)" ]; then
            mkdir -p build
            cp -r build_cache/* build/ || true
          fi
          
          if [ -d "spec_cache" ] && [ "$(ls -A spec_cache)" ]; then
            cp spec_cache/*.spec . || true
          fi

      - name: Build executable with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          poetry run pyinstaller --clean `
                     --onefile `
                     --console `
                     --name=${{ env.APP_NAME }} `
                     --log-level=DEBUG `
                     ${{ env.SOURCE_FILE }}
          
          if (-not (Test-Path "dist\${{ env.APP_NAME }}.exe")) {
              throw "Build failed: Executable not found"
          }

      - name: Build executable with PyInstaller (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -ex
          poetry run pyinstaller --clean \
                     --onefile \
                     --console \
                     --name=${{ env.APP_NAME }} \
                     --log-level=DEBUG \
                     ${{ env.SOURCE_FILE }}
          
          if [ ! -f "dist/${{ env.APP_NAME }}${{ matrix.extension }}" ]; then
            echo "Build failed: Executable not found"
            exit 1
          fi
          
          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            chmod +x dist/${{ env.APP_NAME }}
          fi

      - name: Package build (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path AndroidTVTimeFixer.exe -DestinationPath AndroidTVTimeFixer-windows.zip
          cd ..
          
      - name: Package build (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd dist
          zip AndroidTVTimeFixer-${{ matrix.platform }}.zip AndroidTVTimeFixer
          cd ..

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.platform }}.zip
          retention-days: 90
          if-no-files-found: error

  create-release:
    needs: setup-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            dist/*.zip
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref }}
          draft: false
          prerelease: false
          generate_release_notes: true
