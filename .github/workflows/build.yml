name: Build & Security AndroidTVTimeFixer

on:
  push:
    branches: [main, master]
    paths-ignore: 
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  actions: write

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: AndroidTVTimeFixer
  SOURCE_FILE: android_time_fixer.py

jobs:
  pre-build-security-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: |
          pip install --upgrade poetry
          poetry config virtualenvs.create false

      - name: Install Security Tools
        run: |
          poetry install --only security
          pip install safety pip-audit bandit

      - name: Safety Dependency Check
        continue-on-error: true
        run: |
          safety check --full-report || true
          safety check \
            --ignore-vulnerabilities cloud-init \
            command-not-found distro-info \
            python-apt python-debian \
            sos ubuntu-pro-client \
            ufw WALinuxAgent || true

      - name: Pip Audit
        continue-on-error: true
        run: |
          pip-audit \
            --ignore-vuln cloud-init \
            --ignore-vuln command-not-found \
            --ignore-vuln distro-info \
            --ignore-vuln python-apt \
            --ignore-vuln python-debian \
            --ignore-vuln sos \
            --ignore-vuln ubuntu-pro-client \
            --ignore-vuln ufw \
            --ignore-vuln WALinuxAgent || true

      - name: Bandit Security Scan
        run: |
          bandit -r . \
            -f custom \
            -x ./tests || true

  build-and-test:
    needs: pre-build-security-checks
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: windows-latest
            extension: .exe
            platform: windows
          - os: ubuntu-latest
            extension: ''
            platform: linux
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          check-latest: true

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry==1.7.1

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.in-project true
          poetry config virtualenvs.create true

      - name: Install Dependencies
        run: |
          poetry install --no-interaction

      - name: Generate Dynamic Imports
        run: poetry run python generate_imports.py

      - name: Build Executable
        run: |
          poetry run pyinstaller --clean \
            --onefile \
            --console \
            --name=${{ env.APP_NAME }} \
            $(cat pyinstaller_imports.txt) \
            --add-binary "$ADB_PATH:." \
            --collect-all adb_shell \
            --log-level=INFO \
            ${{ env.SOURCE_FILE }}

      - name: Package Artifact
        run: |
          cd dist
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" "${{ env.APP_NAME }}${{ matrix.extension }}"
          else
            chmod +x ${{ env.APP_NAME }}
            zip "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" "${{ env.APP_NAME }}"
          fi
          sha256sum "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" > "${{ env.APP_NAME }}-${{ matrix.platform }}.sha256"
          cd ..

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: |
            dist/${{ env.APP_NAME }}-${{ matrix.platform }}.zip
            dist/${{ env.APP_NAME }}-${{ matrix.platform }}.sha256
          retention-days: 90

  release:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            dist/*.zip
            dist/*.sha256
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true

  vulnerability-report:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Vulnerability Report
        run: |
          echo "# Security Vulnerability Report" > SECURITY_REPORT.md
          echo "## Safety Check" >> SECURITY_REPORT.md
          safety check --full-report >> SECURITY_REPORT.md
          
          echo "## Pip Audit" >> SECURITY_REPORT.md
          pip-audit >> SECURITY_REPORT.md

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: SECURITY_REPORT.md
