name: Build AndroidTVTimeFixer

on:
  push:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

env:
  PYTHON_VERSION: '3.13'
  APP_NAME: AndroidTVTimeFixer
  SOURCE_FILE: android_time_fixer.py
  CI_DEBUG: true

jobs:
  setup-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            extension: .exe
            platform: windows
          - os: ubuntu-latest
            extension: ''
            platform: linux
          - os: macos-latest
            extension: ''
            platform: macos
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          check-latest: true
          cache: 'pip'

      - name: Create initial requirements
        shell: bash
        run: |
          echo "adb-shell" > requirements.txt
          echo "pyperclip" >> requirements.txt
          echo "pyinstaller" >> requirements.txt
          cat requirements.txt

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: Install dependencies (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: Install zip
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Install zip (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install zip

      - name: Prepare cache directories
        shell: bash
        run: |
          mkdir -p build_cache
          mkdir -p spec_cache
          
          if [ -d "build" ]; then
            cp -r build/* build_cache/ || true
          fi
          
          if [ -f "*.spec" ]; then
            cp *.spec spec_cache/ || true
          fi

      - name: Cache PyInstaller build
        uses: actions/cache@v4
        with:
          path: |
            build_cache
            spec_cache
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('*.py', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-

      - name: Restore cache to build directory
        shell: bash
        run: |
          if [ -d "build_cache" ] && [ "$(ls -A build_cache)" ]; then
            mkdir -p build
            cp -r build_cache/* build/ || true
          fi
          
          if [ -d "spec_cache" ] && [ "$(ls -A spec_cache)" ]; then
            cp spec_cache/*.spec . || true
          fi

      - name: Build executable with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          pyinstaller --clean `
                     --onefile `
                     --console `
                     --name=${{ env.APP_NAME }} `
                     --log-level=DEBUG `
                     ${{ env.SOURCE_FILE }}
          
          if (-not (Test-Path "dist\${{ env.APP_NAME }}.exe")) {
              throw "Build failed: Executable not found"
          }

      - name: Build executable with PyInstaller (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -ex
          pyinstaller --clean \
                     --onefile \
                     --console \
                     --name=${{ env.APP_NAME }} \
                     --log-level=DEBUG \
                     ${{ env.SOURCE_FILE }}
          
          if [ ! -f "dist/${{ env.APP_NAME }}${{ matrix.extension }}" ]; then
            echo "Build failed: Executable not found"
            exit 1
          fi
          
          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            chmod +x dist/${{ env.APP_NAME }}
          fi

      - name: Package build (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path AndroidTVTimeFixer.exe -DestinationPath AndroidTVTimeFixer-windows.zip
          cd ..
          
      - name: Package build (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd dist
          zip -r AndroidTVTimeFixer-${{ matrix.platform }}.zip AndroidTVTimeFixer
          cd ..

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.platform }}.zip
          retention-days: 90
          if-no-files-found: error

      - name: Create version file
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "v1.0.0" > version.txt

  create-release:
    needs: setup-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Update version number
        id: update_version
        run: |
          # Считываем текущую версию
          version=$(cat version.txt)
          
          # Извлекаем части версии: major, minor и patch
          major=$(echo $version | cut -d. -f1)
          minor=$(echo $version | cut -d. -f2)
          patch=$(echo $version | cut -d. -f3)
          
          # Увеличиваем патч-версию на 1
          new_patch=$((patch + 1))
          new_version="$major.$minor.$new_patch"
          
          # Сохраняем новую версию в файл
          echo "$new_version" > version.txt

          # Используем Environment Files для передачи данных
          echo "version=$new_version" >> $GITHUB_ENV

      - name: Commit version update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "Update version to ${{ env.version }}"
          git push origin ${{ github.ref }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            dist/*.zip
          tag_name: v${{ env.version }}
          name: 'Release v${{ env.version }}'
          body: |
            Release v${{ env.version }}
            
            ### Сборки для разных платформ
            - Windows (AMD64): `${{ env.APP_NAME }}-windows.zip`
            - Linux (AMD64): `${{ env.APP_NAME }}-linux.zip`
            - macOS (AMD64): `${{ env.APP_NAME }}-macos.zip`
            
            ### Установка
            
            #### Windows
            1. Распакуйте архив
            2. Запустите .exe файл от имени администратора
            
            #### Linux
            1. Распакуйте архив
            2. Откройте терминал в папке с программой
            3. Выполните команды:
               ```bash
               chmod +x ./${{ env.APP_NAME }}
               ./${{ env.APP_NAME }}
               ```
            
            #### macOS
            1. Распакуйте архив
            2. Откройте терминал в папке с программой
            3. Выполните команды:
               ```bash
               chmod +x ./${{ env.APP_NAME }}
               ./${{ env.APP_NAME }}
               ```
            
            ### Контрольная информация
            - Версия Python: ${{ env.PYTHON_VERSION }}
            - Дата сборки: ${{ github.sha }}
            
            ### Примечания к выпуску
            - Кросс-платформенная сборка для всех основных ОС
            - Автоматическая сборка через GitHub Actions
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Clean up
        if: always()
        shell: bash
        run: |
          echo "Cleaning up artifacts..."
          rm -rf dist
          echo "Cleanup complete"
