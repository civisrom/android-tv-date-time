name: Build and Release AndroidTVTimeFixer

on:
  push:
    branches: 
      - main
      - master
  pull_request:
    branches: 
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: AndroidTVTimeFixer
  SOURCE_FILE: android_time_fixer.py

jobs:
  setup-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            extension: .exe
            platform: windows
          - os: ubuntu-latest
            extension: ''
            platform: linux
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry==1.7.1
        shell: bash

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          poetry install --no-interaction --only main --with windows
        shell: pwsh

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          poetry install --no-interaction --only main --with linux
        shell: bash

      - name: Install PyInstaller
        run: |
          poetry run pip install pyinstaller==6.11.0
        shell: bash

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          poetry run pyinstaller --clean `
            --onefile `
            --console `
            --name=${{ env.APP_NAME }} `
            --hidden-import=pyperclip `
            --hidden-import=colorama `
            ${{ env.SOURCE_FILE }}
        shell: pwsh

      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: |
          poetry run pyinstaller --clean \
            --onefile \
            --console \
            --name=${{ env.APP_NAME }} \
            --hidden-import=pyperclip \
            --hidden-import=colorama \
            ${{ env.SOURCE_FILE }}
        shell: bash

      - name: Package build
        run: |
          cd dist
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" "${{ env.APP_NAME }}${{ matrix.extension }}"
          else
            chmod +x ${{ env.APP_NAME }}
            zip "${{ env.APP_NAME }}-${{ matrix.platform }}.zip" "${{ env.APP_NAME }}"
          fi
          cd ..
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: dist/${{ env.APP_NAME }}-${{ matrix.platform }}.zip

  create-release:
    needs: setup-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*.zip
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
