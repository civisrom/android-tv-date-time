name: Build AndroidTVTimeFixer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # Шаг 1: Клонировать репозиторий
    - name: Checkout repository
      uses: actions/checkout@v4

    # Шаг 2: Установить Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    # Шаг 3: Обновить pip, pyinstaller и adb-shell
    - name: Upgrade pip, pyinstaller, and adb-shell
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade pyinstaller
        pip install --upgrade adb-shell

    # Шаг 4: Сборка исполняемого файла с помощью PyInstaller
    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile --console --name=AndroidTVTimeFixer android_time_fixer.py

    # Шаг 5: Сохранение артефакта как артефакт Workflow
    - name: Upload executable as workflow artifact
      uses: actions/upload-artifact@v4
      with:
        name: AndroidTVTimeFixer
        path: dist/AndroidTVTimeFixer.exe

    # Шаг 6: Чтение тега из файла version.txt
    - name: Read version tag from version.txt
      id: read_version
      shell: bash
      run: |
        if [ -f "version.txt" ]; then
          echo "VERSION_TAG=$(cat version.txt)" >> $GITHUB_OUTPUT
        else
          echo "Error: version.txt not found!" >&2
          exit 1
        fi

    # Шаг 7: Создать релиз с новой версией
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main'
      with:
        files: dist/AndroidTVTimeFixer.exe
        tag_name: ${{ steps.read_version.outputs.VERSION_TAG }}
        name: 'AndroidTVTimeFixer Release'
        body: |
          Первый релиз AndroidTVTimeFixer, включающий исправление времени на Android TV.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
