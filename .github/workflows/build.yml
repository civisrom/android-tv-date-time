name: Build AndroidTVTimeFixer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # Шаг 1: Клонировать репозиторий
    - name: Checkout repository
      uses: actions/checkout@v4

    # Шаг 2: Установить Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    # Шаг 3: Установить зависимости
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller adb-shell

    # Шаг 4: Сборка исполняемого файла с помощью PyInstaller
    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile --console --name=AndroidTVTimeFixer android_time_fixer.py

    # Шаг 5: Сохранение артефакта как артефакт Workflow
    - name: Upload executable as workflow artifact
      uses: actions/upload-artifact@v4
      with:
        name: AndroidTVTimeFixer
        path: dist/AndroidTVTimeFixer.exe  # Путь к скомпилированному файлу в папке dist

    # Шаг 6: Создание версии для релиза
    - name: Create version tag
      id: create_tag
      run: |
        TAG="v$(date +'%Y.%m.%d.%H%M%S')"  # Динамически генерируем тег на основе времени
        echo "Generated tag: $TAG"
        echo "::set-output name=tag_name::$TAG"
      
    # Шаг 7: Создать релиз
    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      with:
        tag_name: ${{ steps.create_tag.outputs.tag_name }}  # Используем сгенерированный тег
        release_name: 'AndroidTVTimeFixer Release'
        draft: false
        prerelease: false
        body: |
          Первый релиз AndroidTVTimeFixer, включающий исправление времени на Android TV.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Шаг 8: Загрузка артефакта в релиз
    - name: Upload to GitHub Release
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist/AndroidTVTimeFixer.exe
        asset_name: AndroidTVTimeFixer.exe
        label: "AndroidTVTimeFixer Executable"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
