name: Build AndroidTVTimeFixer

on:
  push:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: 
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

env:
  PYTHON_VERSION: '3.13'
  APP_NAME: AndroidTVTimeFixer
  SOURCE_FILE: android_time_fixer.py
  CI_DEBUG: true

jobs:
  setup-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            extension: .exe
            separator: '\\'
          - os: ubuntu-latest
            extension: ''
            separator: '/'
          - os: macos-latest
            extension: ''
            separator: '/'
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        persist-credentials: false

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        check-latest: true

    - name: Create initial requirements
      shell: bash
      run: |
        echo "adb-shell" > requirements.txt
        echo "pyperclip" >> requirements.txt
        echo "pyinstaller" >> requirements.txt
        cat requirements.txt

    - name: Install dependencies (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip list

    - name: Install dependencies (Unix)
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip list

    - name: Cache PyInstaller build
      uses: actions/cache@v4
      with:
        path: |
          build
          *.spec
        key: ${{ runner.os }}-pyinstaller-${{ hashFiles('*.py', 'requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pyinstaller-

    - name: Verify CI environment
      shell: bash
      run: |
        echo "CI Environment Information:"
        echo "OS: ${{ runner.os }}"
        echo "Python Version: $(python --version)"
        echo "Working Directory: $(pwd)"
        echo "Directory Contents:"
        ls -la
        echo "Python Location: $(which python || where python)"
        echo "Pip Location: $(which pip || where pip)"

    - name: Build executable with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        pyinstaller --clean `
                   --onefile `
                   --console `
                   --name=${{ env.APP_NAME }} `
                   --log-level=DEBUG `
                   ${{ env.SOURCE_FILE }}
        
        if (-not (Test-Path "dist\${{ env.APP_NAME }}.exe")) {
            throw "Build failed: Executable not found"
        }

    - name: Build executable with PyInstaller (Unix)
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        set -ex
        pyinstaller --clean \
                   --onefile \
                   --console \
                   --name=${{ env.APP_NAME }} \
                   --log-level=DEBUG \
                   ${{ env.SOURCE_FILE }}
        
        if [ ! -f "dist/${{ env.APP_NAME }}${{ matrix.extension }}" ]; then
          echo "Build failed: Executable not found"
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-${{ runner.os }}
        path: dist/${{ env.APP_NAME }}${{ matrix.extension }}
        retention-days: 90
        if-no-files-found: error

    - name: Create version file
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        "v1.0.0" | Out-File -FilePath "version.txt" -Encoding UTF8 -NoNewline

    - name: Create GitHub Release
      if: |
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
        matrix.os == 'windows-latest'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: dist/${{ env.APP_NAME }}${{ matrix.extension }}
        tag_name: v1.0.0
        name: '${{ env.APP_NAME }} v1.0.0'
        body: |
          Release v1.0.0
          
          ### Что нового
          - Кросс-платформенная сборка для Windows, Linux и macOS
          - Автоматическая сборка через GitHub Actions
          
          ### Контрольная информация
          - Дата сборки: ${{ github.sha }}
          - Версия Python: ${{ env.PYTHON_VERSION }}
          - Платформа сборки: ${{ runner.os }}
          
          ### Установка
          1. Скачайте файл для вашей операционной системы
          2. Запустите программу от имени администратора (для Windows)
          3. Для Linux/macOS: `chmod +x ./${{ env.APP_NAME }} && ./${{ env.APP_NAME }}`
        draft: false
        prerelease: false
        generate_release_notes: true

    - name: Clean up
      if: always()
      shell: bash
      run: |
        echo "Cleaning up build artifacts..."
        rm -rf dist build *.spec || true
        echo "Cleanup complete"
