name: Build AndroidTVTimeFixer

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run workflow with verbose logging'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.13'
  APP_NAME: AndroidTVTimeFixer

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Create requirements.txt
      shell: pwsh
      run: |
        @"
        # Python dependencies for AndroidTVTimeFixer
        # Created automatically by GitHub Actions

        # Main dependencies
        pyinstaller==6.5.0
        adb-shell==0.4.4

        # Testing dependencies
        pytest==8.0.2
        pytest-cov==4.1.0

        # Development dependencies
        wheel==0.42.0
        setuptools==69.1.1
        "@ | Out-File -FilePath "requirements.txt" -Encoding UTF8
        
        Write-Host "Created requirements.txt with content:"
        Get-Content "requirements.txt"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        check-latest: true

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~\AppData\Local\pip\Cache
          ~\.pyinstaller
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install and upgrade dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      continue-on-error: false

    - name: Export current dependencies
      shell: pwsh
      run: |
        pip freeze > current_requirements.txt
        Write-Host "Current dependencies:"
        Get-Content current_requirements.txt

    - name: Verify source files and environment
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        
        # Проверка наличия исходного файла
        if (-not (Test-Path "android_time_fixer.py")) {
            throw "Source file 'android_time_fixer.py' not found!"
        }
        
        # Проверка наличия requirements.txt
        if (-not (Test-Path "requirements.txt")) {
            throw "Requirements file 'requirements.txt' not found!"
        }
        
        # Проверка версии Python
        $pythonVersion = python --version
        Write-Host "Python version: $pythonVersion"
        
        # Проверка установленных пакетов
        pip list
        
        # Проверка доступного места на диске
        $disk = Get-WmiObject Win32_LogicalDisk -Filter "DeviceID='C:'"
        $freeSpaceGB = [math]::Round($disk.FreeSpace / 1GB, 2)
        Write-Host "Free disk space: $freeSpaceGB GB"
        
        if ($freeSpaceGB -lt 1) {
            throw "Insufficient disk space! Need at least 1 GB free."
        }

    - name: Run tests
      run: |
        pytest --cov=. --cov-report=xml
      continue-on-error: true

    - name: Build executable with PyInstaller
      run: |
        pyinstaller --clean --onefile --console `
          --name=${{ env.APP_NAME }} `
          --noconfirm `
          --log-level=INFO `
          android_time_fixer.py
      env:
        PYTHONOPTIMIZE: 2

    - name: Verify build output
      shell: pwsh
      run: |
        $exePath = "dist\${{ env.APP_NAME }}.exe"
        if (-not (Test-Path $exePath)) {
            throw "Build failed: $exePath not found!"
        }
        $fileInfo = Get-Item $exePath
        Write-Host "File size: $([math]::Round($fileInfo.Length / 1MB, 2)) MB"
        Write-Host "Created: $($fileInfo.CreationTime)"
        
        # Проверка, что файл не пустой и исполняемый
        if ($fileInfo.Length -lt 1MB) {
            throw "Suspicious file size: executable is too small!"
        }

    - name: Upload executable as workflow artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}
        path: |
          dist/${{ env.APP_NAME }}.exe
          requirements.txt
          current_requirements.txt
        retention-days: 5
        if-no-files-found: error

    - name: Handle version file
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        if (-not (Test-Path "version.txt")) {
            "v1.0.0" | Out-File -FilePath "version.txt" -Encoding UTF8
            Write-Host "Created version.txt with v1.0.0"
        }
        $version = Get-Content -Path "version.txt" -Raw
        if (-not ($version -match '^v\d+\.\d+\.\d+')) {
            throw "Invalid version format in version.txt. Expected format: v1.0.0"
        }
        echo "VERSION_TAG=$version" >> $env:GITHUB_ENV

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: |
          dist/${{ env.APP_NAME }}.exe
          requirements.txt
          current_requirements.txt
        tag_name: ${{ env.VERSION_TAG }}
        name: '${{ env.APP_NAME }} ${{ env.VERSION_TAG }}'
        body: |
          # Release ${{ env.VERSION_TAG }}
          
          ## Что нового
          - Автоматическая сборка из ветки ${{ github.ref_name }}
          - Время сборки: ${{ github.event.head_commit.timestamp }}
          
          ## Файлы
          - ${{ env.APP_NAME }}.exe - основной исполняемый файл
          - requirements.txt - файл зависимостей
          - current_requirements.txt - текущие версии всех зависимостей
          
          ## Системные требования
          - Windows 7/8/10/11
          - Не требует установки Python
          
          ## Зависимости
          ```
          pyinstaller==6.5.0
          adb-shell==0.4.4
          pytest==8.0.2
          pytest-cov==4.1.0
          ```
          
          ## Примечания к релизу
          Это автоматически сгенерированный релиз из последних изменений в репозитории.
        draft: false
        prerelease: false
        generate_release_notes: true

    - name: Clean up
      if: always()
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Continue'
        Remove-Item -Path "dist", "build" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "*.spec" -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "*.pyc" -Recurse -Force -ErrorAction SilentlyContinue
        Remove-Item -Path "__pycache__" -Recurse -Force -ErrorAction SilentlyContinue
