name: Build AndroidTVTimeFixer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # Шаг 1: Клонировать репозиторий
    - name: Checkout repository
      uses: actions/checkout@v4

    # Шаг 2: Установить Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    # Шаг 3: Обновить pip, pyinstaller и adb-shell
    - name: Upgrade pip, pyinstaller, and adb-shell
      run: |
        python -m pip install --upgrade pip  # Обновление pip
        pip install --upgrade pyinstaller   # Обновление pyinstaller
        pip install --upgrade adb-shell     # Обновление adb-shell

    # Шаг 4: Сборка исполняемого файла с помощью PyInstaller
    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile --console --name=AndroidTVTimeFixer android_time_fixer.py

    # Шаг 5: Сохранение артефакта как артефакт Workflow
    - name: Upload executable as workflow artifact
      uses: actions/upload-artifact@v4  # Используем последнюю версию v4
      with:
        name: AndroidTVTimeFixer
        path: dist/AndroidTVTimeFixer.exe  # Путь к скомпилированному файлу в папке dist

    # Шаг 6: Чтение тега из файла version.txt
    - name: Read version tag from version.txt
      id: read_version
      run: |
        # Проверяем наличие файла version.txt
        if [ -f "version.txt" ]; then
          VERSION=$(cat version.txt)  # Читаем содержимое version.txt
          echo "Version found: $VERSION"
          echo "VERSION_TAG=$VERSION" >> $GITHUB_ENV  # Записываем в переменные окружения
        else
          echo "Error: version.txt not found!" >&2
          exit 1
        fi

    # Шаг 7: Создать релиз с новой версией
    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v2  # Используем актуальную версию v2
      with:
        tag_name: ${{ env.VERSION_TAG }}  # Используем тег из файла version.txt
        release_name: 'AndroidTVTimeFixer Release'
        draft: false
        prerelease: false
        body: |
          Первый релиз AndroidTVTimeFixer, включающий исправление времени на Android TV.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Шаг 8: Загрузка артефакта в релиз
    - name: Upload to GitHub Release
      uses: actions/upload-release-asset@v2  # Используем актуальную версию v2
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist/AndroidTVTimeFixer.exe
        asset_name: AndroidTVTimeFixer.exe
        asset_content_type: application/octet-stream  # Указываем тип контента для .exe файла
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
